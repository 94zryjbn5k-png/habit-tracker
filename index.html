    if (!h) return;
    lpConsume = true;
    openNoteModal(h, dateKey(selectedDate));
  }, 550);
});
document.addEventListener('pointermove', ev => {
  if (!lpTimer) return;
  const dx = (ev.clientX || 0) - lpX, dy = (ev.clientY || 0) - lpY;
  if (dx * dx + dy * dy > 144) lpClear();
});
document.addEventListener('pointerup', lpClear);
document.addEventListener('pointercancel', lpClear);

document.addEventListener('click', ev => {
  if (lpConsume){ lpConsume = false; ev.stopPropagation(); ev.preventDefault(); return; }
  const el = ev.target.closest('[data-action]');
  if (!el || el.disabled) return;
  const act = el.dataset.action;
  const id = el.dataset.id;

  switch (act){
    case 'tab': {
      tab = el.dataset.tab;
      if (tab === 'cal'){
        weekAnchor = startOfWeek(selectedDate);
        monthAnchor = firstOfMonth(selectedDate);
      }
      render();
      break;
    }
    case 'prevDay': selectedDate = addDays(selectedDate, -1); render(); break;
    case 'nextDay': {
      const n = addDays(selectedDate, 1);
      if (tab === 'meals' || n <= today()) { selectedDate = n; render(); }
      break;
    }
    case 'goToday': selectedDate = today(); render(); break;
    case 'calWeek': calView = 'week'; render(); break;
    case 'calMonth': calView = 'month'; render(); break;
    case 'addSnack': mealSnackUI.n = Math.min(12, mealSnackUI.n + 1); render(); break;
    case 'toggleHide': data.hideDone = !data.hideDone; save(); render(); break;
    case 'openTheme': openThemeModal(); break;
    case 'setThemeBg': data.theme = normTheme({ ...normTheme(data.theme), bg: el.dataset.v }); save(); applyTheme(); openThemeModal(); break;
    case 'setThemeCard': data.theme = normTheme({ ...normTheme(data.theme), card: el.dataset.v }); save(); applyTheme(); openThemeModal(); break;
    case 'setThemeText': data.theme = normTheme({ ...normTheme(data.theme), text: el.dataset.v }); save(); applyTheme(); openThemeModal(); break;
    case 'resetTheme': data.theme = { ...THEME_DEFAULT }; save(); applyTheme(); openThemeModal(); break;
    case 'mealHist': openMealHistModal(el.dataset.f); break;
    case 'pickMeal': {
      const f = el.dataset.f;
      const v = el.dataset.v || '';
      const k = dateKey(selectedDate);
      const m = mealObj(k);
      if (f === 'sn'){ m.sn.push(v); }
      else m[f] = v;
      data.meals[k] = { b: m.b, l: m.l, d: m.d, sn: m.sn, note: m.note };
      save(); closeModal(); render();
      toast('Vyplněno z historie');
      break;
    }
    case 'saveNote': {
      const h = habitById(id);
      if (!h) break;
      setNote(el.dataset.key, h.id, ($('#f-note') && $('#f-note').value) || '');
      closeModal(); render();
      toast('Poznámka uložena');
      break;
    }
    case 'delNote': {
      const h = habitById(id);
      if (!h) break;
      setNote(el.dataset.key, h.id, '');
      closeModal(); render();
      toast('Poznámka smazána');
      break;
    }
    case 'startTimer': {
      const h = habitById(id);
      if (!h || !h.timerMin) break;
      startTimer(h, el.dataset.key || dateKey(selectedDate));
      toast('⏱️ ' + h.name + ' — ' + h.timerMin + ' min běží');
      break;
    }
    case 'cancelTimer': stopTimer(); toast('Časovač zrušen'); break;
    case 'gotoDay': {
      let d = parseKey(el.dataset.key);
      if (d > today()) d = today();
      selectedDate = d;
      tab = 'day';
      render();
      break;
    }
    case 'prevWeek': weekAnchor = addDays(weekAnchor, -7); render(); break;
    case 'nextWeek': weekAnchor = addDays(weekAnchor, 7); render(); break;
    case 'thisWeek': weekAnchor = startOfWeek(today()); render(); break;
    case 'prevMonth': monthAnchor = new Date(monthAnchor.getFullYear(), monthAnchor.getMonth() - 1, 1); render(); break;
    case 'nextMonth': monthAnchor = new Date(monthAnchor.getFullYear(), monthAnchor.getMonth() + 1, 1); render(); break;
    case 'thisMonth': monthAnchor = firstOfMonth(today()); render(); break;

    case 'toggleEdit': editMode = !editMode; render(); break;
    case 'addHabit': openHabitModal(null); break;
    case 'editHabit': { const h = habitById(id); if (h) openHabitModal(h); break; }
    case 'confirmDelete': { const h = habitById(id); if (h) openDeleteModal(h, el.dataset.arch === '1'); break; }
    case 'archiveHabit': {
      const h = habitById(id);
      if (h){ h.archived = true; save(); closeModal(); render(); toast('Návyk „' + h.name + '“ byl archivován'); }
      break;
    }
    case 'deleteHabit': {
      const h = habitById(id);
      if (h){
        data.habits = data.habits.filter(x => x.id !== id);
        for (const k of Object.keys(data.entries)){
          delete data.entries[k][id];
          if (!Object.keys(data.entries[k]).length) delete data.entries[k];
        }
        save(); closeModal(); render();
        toast('Návyk „' + h.name + '“ byl smazán');
      }
      break;
    }
    case 'restoreHabit': {
      const h = habitById(id);
      if (h){
        h.archived = false;
        h.order = activeHabits().reduce((m, x) => Math.max(m, x.order), -1) + 1;
        save(); render();
        toast('Návyk „' + h.name + '“ byl obnoven');
      }
      break;
    }
    case 'moveUp': moveHabit(id, -1); render(); break;
    case 'moveDown': moveHabit(id, 1); render(); break;

    case 'rowToggle': {
      const h = habitById(id);
      if (!h) break;
      const key = dateKey(selectedDate);
      const was = isDone(h, key);
      if (!was && isPeriodic(h)){
        const f = habitFreq(h);
        const dk = f.type === 'weekly' ? doneInWeek(h, startOfWeek(selectedDate)) : doneInMonth(h, firstOfMonth(selectedDate));
        if (dk && dk !== key){
          toast('„' + h.name + '“ už je splněno — ' + fmtKeyShort(dk) + '. Zrušit to jde jen na tom dni.');
          break;
        }
      }
      setVal(key, h.id, was ? false : true);
      if (!was) popRef = { id: h.id, key };
      render();
      break;
    }
    case 'cellToggle': {
      const h = habitById(id);
      if (!h) break;
      const key = el.dataset.key;
      setVal(key, h.id, isDone(h, key) ? false : true);
      render();
      break;
    }
    case 'inc': case 'dec': {
      const h = habitById(id);
      if (!h || h.type !== 'number') break;
      const key = dateKey(selectedDate);
      const was = isDone(h, key);
      const step = (h.goal && h.goal <= 3) ? 0.5 : 1;
      let v = numVal(h, key) + (act === 'inc' ? step : -step);
      v = Math.max(0, Math.round(v * 100) / 100);
      setVal(key, h.id, v);
      if (!was && isDone(h, key)) popRef = { id: h.id, key };
      render();
      break;
    }

    case 'setType': {
      document.querySelectorAll('#type-seg .seg-btn').forEach(b => b.classList.toggle('on', b === el));
      const gf = $('#goal-fields');
      if (gf) gf.hidden = el.dataset.type !== 'number';
      break;
    }
    case 'setFreq': {
      document.querySelectorAll('#freq-seg .seg-btn').forEach(b => b.classList.toggle('on', b === el));
      const df = $('#days-fields');
      if (df) df.hidden = el.dataset.freq !== 'days';
      break;
    }
    case 'toggleDay': el.classList.toggle('on'); break;
    case 'vacHabit': { const h = habitById(id); if (h) openVacModal(h); break; }
    case 'addVac': {
      const h = habitById(id);
      if (!h) break;
      const r = readVacDates();
      if (!r) break;
      h.vacations = normVacs([...vacList(h), r]);
      save(); render();
      openVacModal(h);
      toast('Prázdniny přidány');
      break;
    }
    case 'delVac': {
      const h = habitById(id);
      if (!h) break;
      h.vacations = vacList(h).filter(v => !(v.from === el.dataset.from && v.to === el.dataset.to));
      save(); render();
      openVacModal(h);
      toast('Prázdniny smazány');
      break;
    }
    case 'vacAll': openVacAllModal(); break;
    case 'applyVacAll': {
      const r = readVacDates();
      if (!r) break;
      const act = activeHabits();
      act.forEach(h => { h.vacations = normVacs([...vacList(h), r]); });
      save(); closeModal(); render();
      toast('Prázdniny ' + fmtKeyShort(r.from) + ' – ' + fmtKeyShort(r.to) + ' nastaveny pro ' + act.length + ' ' + plural(act.length, 'návyk', 'návyky', 'návyků'));
      break;
    }
    case 'endVacAll': {
      const tk = dateKey(today());
      const yk = dateKey(addDays(today(), -1));
      data.habits.forEach(h => {
        if (!Array.isArray(h.vacations)) return;
        h.vacations = h.vacations.map(v => {
          if (v.from <= tk && tk <= v.to){
            if (v.from === tk) return null; // začaly dnes → smazat celé
            return { from: v.from, to: yk }; // jinak ukončit včerejškem
          }
          return v;
        }).filter(Boolean);
      });
      save(); closeModal(); render();
      toast('Probíhající prázdniny ukončeny');
      break;
    }
    case 'editPlan': {
      planEdit = true;
      planDraft = data.plan || '';
      render();
      const ta = $('#plan-ta');
      if (ta) ta.focus();
      break;
    }
    case 'cancelPlan': planEdit = false; render(); break;
    case 'savePlan': {
      const ta = $('#plan-ta');
      data.plan = ((ta ? ta.value : planDraft) || '').slice(0, 50000);
      planEdit = false;
      save(); render();
      toast('Plán uložen');
      break;
    }
    case 'pickEmoji': { const f = $('#f-emoji'); if (f) f.value = el.dataset.emoji; break; }
    case 'saveHabit': {
      const name = ($('#f-name') && $('#f-name').value || '').trim();
      if (!name){ toast('Zadejte název návyku', true); break; }
      const emoji = ($('#f-emoji') && $('#f-emoji').value || '').trim().slice(0, 8);
      const typeBtn = document.querySelector('#type-seg .seg-btn.on');
      const type = typeBtn ? typeBtn.dataset.type : 'check';
      let goal = null, unit = '';
      if (type === 'number'){
        goal = parseNum($('#f-goal') ? $('#f-goal').value : '');
        if (!isFinite(goal) || goal <= 0){ toast('Zadejte platný cíl (číslo větší než 0)', true); break; }
        goal = Math.round(goal * 100) / 100;
        unit = ($('#f-unit') && $('#f-unit').value || '').trim().slice(0, 20);
      }
      const freqBtn = document.querySelector('#freq-seg .seg-btn.on');
      let freq = { type: freqBtn ? freqBtn.dataset.freq : 'daily' };
      if (freq.type === 'days'){
        const days = [...document.querySelectorAll('#days-fields .day-chip.on')].map(b => Number(b.dataset.day));
        if (!days.length){ toast('Vyberte aspoň jeden den v týdnu', true); break; }
        freq.days = days;
      }
      freq = normFreq(freq);
      const tmRaw = ($('#f-timer') && $('#f-timer').value || '').trim();
      const tm = parseInt(tmRaw, 10);
      const timerMin = (tmRaw && isFinite(tm) && tm >= 1 && tm <= 600) ? tm : null;
      if (tmRaw && timerMin === null){ toast('Časovač: zadejte 1–600 minut, nebo nechte prázdné', true); break; }
      if (id){
        const h = habitById(id);
        if (h){ h.name = name.slice(0, 60); h.emoji = emoji; h.type = type; h.goal = goal; h.unit = unit; h.freq = freq; h.timerMin = timerMin; }
        toast('Návyk upraven');
      } else {
        data.habits.push({
          id: uid(), name: name.slice(0, 60), emoji, type, goal, unit, freq,
          archived: false,
          order: data.habits.reduce((m, x) => Math.max(m, x.order), -1) + 1,
          createdAt: Date.now(),
          vacations: [],
          timerMin
        });
        toast('Návyk přidán');
      }
      save(); closeModal(); render();
      break;
    }

    case 'exportData': exportData(); break;
    case 'importData': { const f = $('#importFile'); f.value = ''; f.click(); break; }
    case 'applyImport': {
      if (pendingImport){
        data = pendingImport;
        pendingImport = null;
        save();
        selectedDate = today();
        editMode = false;
        closeModal(); render();
        toast('Data byla importována');
      }
      break;
    }
    case 'closeModal': closeModal(); break;
  }
});

document.addEventListener('change', ev => {
  const el = ev.target;
  if (el.id === 'importFile'){
    if (el.files && el.files[0]) handleImportFile(el.files[0]);
    return;
  }
  if (el.classList.contains('num-input')){
    const h = habitById(el.dataset.id);
    if (!h) return;
    const key = dateKey(selectedDate);
    const was = isDone(h, key);
    const v = parseNum(el.value);
    if (!isFinite(v) || v < 0){
      render();
      toast('Neplatné číslo', true);
      return;
    }
    setVal(key, h.id, Math.round(v * 100) / 100);
    if (!was && isDone(h, key)) popRef = { id: h.id, key };
    render();
  }
});

document.addEventListener('input', ev => {
  const t = ev.target;
  if (!t) return;
  if (t.id === 'plan-ta'){ planDraft = t.value; return; }
  if (t.id === 'meal-b' || t.id === 'meal-l' || t.id === 'meal-d' || t.id === 'meal-note' || t.classList.contains('meal-sn')){
    const k = dateKey(selectedDate);
    const m = mealObj(k);
    if (t.id === 'meal-b') m.b = t.value;
    else if (t.id === 'meal-l') m.l = t.value;
    else if (t.id === 'meal-d') m.d = t.value;
    else if (t.id === 'meal-note') m.note = t.value;
    m.sn = [...document.querySelectorAll('#view-meals .meal-sn')].map(x => x.value.slice(0, 500));
    const any = m.b.trim() || m.l.trim() || m.d.trim() || m.note.trim() || m.sn.some(s => s.trim());
    if (any) data.meals[k] = { b: m.b.slice(0, 2000), l: m.l.slice(0, 2000), d: m.d.slice(0, 2000), sn: m.sn, note: m.note.slice(0, 2000) };
    else delete data.meals[k];
    save();
  }
});

document.addEventListener('keydown', ev => {
  if (ev.key === 'Escape' && $('#modal-root').firstChild){ closeModal(); return; }
  if ((ev.key === 'Enter' || ev.key === ' ') && ev.target.classList && ev.target.classList.contains('habit-row') && ev.target.dataset.action === 'rowToggle'){
    ev.preventDefault();
    ev.target.click();
  }
  if (ev.key === 'Enter' && ev.target.classList && ev.target.classList.contains('num-input')){
    ev.target.blur();
  }
});

/* Drag & drop (počítač) */
document.addEventListener('dragstart', ev => {
  const row = ev.target.closest && ev.target.closest('.habit-row.edit[draggable]');
  if (!row || row.dataset.idx === undefined){ return; }
  dragFrom = Number(row.dataset.idx);
  row.classList.add('dragging');
  if (ev.dataTransfer){ ev.dataTransfer.effectAllowed = 'move'; try { ev.dataTransfer.setData('text/plain', String(dragFrom)); } catch (e) {} }
});
document.addEventListener('dragover', ev => {
  const row = ev.target.closest && ev.target.closest('.habit-row.edit[draggable]');
  if (row && dragFrom !== null){
    ev.preventDefault();
    document.querySelectorAll('.habit-row.drag-over').forEach(r => r.classList.remove('drag-over'));
    if (Number(row.dataset.idx) !== dragFrom) row.classList.add('drag-over');
  }
});
document.addEventListener('drop', ev => {
  const row = ev.target.closest && ev.target.closest('.habit-row.edit[draggable]');
  if (row && dragFrom !== null){
    ev.preventDefault();
    reorderActive(dragFrom, Number(row.dataset.idx));
    dragFrom = null;
    render();
  }
});
document.addEventListener('dragend', () => {
  dragFrom = null;
  document.querySelectorAll('.habit-row.dragging,.habit-row.drag-over').forEach(r => r.classList.remove('dragging', 'drag-over'));
});

/* ============ Toast ============ */
let toastTimer = null;
function toast(msg, isErr){
  const t = $('#toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2600);
}

/* ============ Hlavní render ============ */
function render(){
  applyTheme();
  ['day', 'cal', 'meals', 'stats', 'plan'].forEach(v => { $('#view-' + v).hidden = v !== tab; });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('on', b.dataset.tab === tab));
  if (tab === 'day') renderDay();
  else if (tab === 'cal') renderCal();
  else if (tab === 'meals') renderMeals();
  else if (tab === 'plan') renderPlan();
  else renderStats();
  popRef = null;
}

/* Po návratu do aplikace další den se přepni na aktuální datum */
let lastSeen = dateKey(today());
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && dateKey(today()) !== lastSeen){
    lastSeen = dateKey(today());
    selectedDate = today();
    weekAnchor = startOfWeek(today());
    monthAnchor = firstOfMonth(today());
    render();
  }
});

/* ============ Start ============ */
storageOk = checkStorage();
data = load();
if (!storageOk) $('#storage-banner').hidden = false;
render();

/* PWA: offline režim přes service worker (jen na webu, lokální soubor nezmění) */
if ('serviceWorker' in navigator && location.protocol === 'https:'){
  navigator.serviceWorker.register('sw.js').catch(function(){});
}
</script>
</body>
</html>
