<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#f2f2f7">
<meta name="theme-color" media="(prefers-color-scheme: dark)" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Návyky">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<title>Habit Tracker</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%85%3C/text%3E%3C/svg%3E">
<style>
:root{
  --bg:#f2f2f7; --card:#ffffff; --text:#1c1c1e; --muted:#8a8a8e; --line:#e4e4e9;
  --text-bg:#1c1c1e; --muted-bg:#8a8a8e; --field-bg:#ececf1;
  --accent:#0a84ff; --green:#34c759; --green-soft:rgba(52,199,89,.13); --red:#ff3b30;
  --btn-bg:#e9e9ee;
  --h0:#e4e4e9; --h1:#9be9a8; --h2:#40c463; --h3:#30a14e; --h4:#216e39;
  --shadow:0 1px 2px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
  --radius:16px;
  --tabbar-bg:rgba(249,249,251,.88);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
[hidden]{display:none !important;}
html{-webkit-text-size-adjust:100%;}
body{
  margin:0; background:var(--bg); color:var(--text-bg);
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  font-size:17px; line-height:1.45;
}
body.no-scroll{overflow:hidden;}
button{font-family:inherit;font-size:inherit;color:inherit;background:none;border:0;padding:0;cursor:pointer;touch-action:manipulation;}
button:disabled{opacity:.35;cursor:default;}
:focus{outline:none;}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:8px;}
input{font-family:inherit;color:var(--text);}
input,textarea{-webkit-appearance:none;appearance:none;}

#app{
  max-width:680px;margin:0 auto;
  padding:10px calc(16px + env(safe-area-inset-right)) calc(96px + env(safe-area-inset-bottom)) calc(16px + env(safe-area-inset-left));
}

/* ---------- hlavička aplikace ---------- */
.app-top{padding:6px 2px 10px;display:flex;align-items:baseline;justify-content:space-between;}
.app-title{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted-bg);}

#storage-banner{
  background:#fff3cd;color:#5c4400;border:1px solid #e8d48a;
  border-radius:12px;padding:10px 14px;font-size:14px;margin:0 0 12px;
}

/* ---------- navigace dne / týdne / měsíce ---------- */
.daynav{display:flex;align-items:center;gap:8px;margin:2px 0 14px;}
.daynav-mid{flex:1;text-align:center;min-width:0;}
.daynav-date{font-size:21px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.daynav-sub{font-size:13px;color:var(--muted-bg);margin-top:1px;}
.linklike{font-size:13px;color:var(--accent);min-height:24px;padding:2px 6px;border-radius:8px;}
.icon-btn{
  min-width:44px;min-height:44px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:12px;background:var(--card);color:var(--text);box-shadow:var(--shadow);
  font-size:22px;line-height:1;user-select:none;-webkit-user-select:none;
}
.icon-btn:active:not(:disabled){transform:scale(.94);}

/* ---------- karty ---------- */
.card{background:var(--card);color:var(--text);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.card h3{margin:0 0 8px;font-size:16px;}
.card p{margin:0 0 12px;}
.card p:last-child{margin-bottom:0;}
.muted{color:var(--muted);font-size:14px;}
.empty{text-align:center;color:var(--muted);padding:28px 16px;}
.hint{font-size:12.5px;color:var(--muted-bg);margin:10px 2px 0;}
.sec-title{font-size:14px;font-weight:600;color:var(--muted-bg);margin:20px 4px 8px;text-transform:uppercase;letter-spacing:.06em;}
.view-title{font-size:26px;font-weight:800;letter-spacing:-.02em;margin:4px 2px 14px;}

/* ---------- denní progres ---------- */
.progress-card{padding:14px 16px;}
.progress-txt{display:flex;justify-content:space-between;align-items:baseline;gap:10px;font-size:15px;margin-bottom:9px;}
.progress-txt .muted{font-weight:700;font-variant-numeric:tabular-nums;flex:0 0 auto;}
.bar{height:8px;border-radius:4px;background:var(--btn-bg);overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;background:var(--green);transition:width .3s ease;}

/* ---------- toolbar ---------- */
.toolbar{display:flex;gap:8px;justify-content:flex-end;margin:0 0 12px;}
.btn{
  min-height:44px;padding:0 16px;border-radius:12px;background:var(--card);color:var(--text);
  box-shadow:var(--shadow);font-size:15px;font-weight:600;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  user-select:none;-webkit-user-select:none;
}
.btn:active{transform:scale(.97);}
.btn.small{font-size:14.5px;padding:0 14px;}
.btn.primary{background:var(--accent);color:#fff;}
.btn.danger{background:var(--red);color:#fff;}
.btn.ghost{background:var(--btn-bg);box-shadow:none;}
.row-btns{display:flex;gap:10px;flex-wrap:wrap;}
.row-btns .btn{flex:1;min-width:150px;background:var(--btn-bg);box-shadow:none;}

/* ---------- řádky návyků ---------- */
.habit-list{display:flex;flex-direction:column;gap:8px;}
.habit-row{
  display:flex;align-items:center;gap:12px;
  background:var(--card);color:var(--text);border-radius:var(--radius);
  padding:10px 14px;min-height:62px;box-shadow:var(--shadow);
  user-select:none;-webkit-user-select:none;
  transition:background .2s ease, transform .12s ease;
}
.habit-row.check{cursor:pointer;}
.habit-row.check:active{transform:scale(.985);}
.habit-row.done{background:var(--green-soft);}
.h-emoji{
  width:34px;height:34px;flex:0 0 34px;display:inline-flex;align-items:center;justify-content:center;
  font-size:23px;line-height:1;
}
.h-emoji.letter{background:var(--btn-bg);border-radius:50%;font-size:16px;font-weight:700;color:var(--muted);}
.pop-wrap{display:inline-flex;}
.h-main{flex:1;min-width:0;}
.h-name{font-weight:600;font-size:16.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.h-sub{font-size:13px;color:var(--muted);margin-top:1px;}
.h-meta{display:flex;align-items:baseline;gap:10px;margin-top:1px;min-width:0;}
.h-streak{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;}
.h-streak.zero{opacity:.45;}
.h-goal{font-size:13px;color:var(--muted);font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-bar{height:4px;border-radius:2px;background:var(--btn-bg);margin-top:7px;overflow:hidden;}
.mini-bar span{display:block;height:100%;border-radius:2px;background:var(--green);}

/* zaškrtávací kolečko */
.checkbox{
  width:30px;height:30px;flex:0 0 30px;border-radius:50%;
  border:2.2px solid var(--line);display:flex;align-items:center;justify-content:center;
  transition:background .18s ease, border-color .18s ease;
}
.habit-row.done .checkbox{background:var(--green);border-color:var(--green);}
.checkbox svg{width:17px;height:17px;display:block;}
.checkbox svg path{fill:none;stroke:#fff;stroke-width:3.2;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:26;stroke-dashoffset:0;}
.pop{animation:pop .38s cubic-bezier(.3,1.7,.5,1);}
.pop svg path{animation:draw .32s ease .04s both;}
@keyframes pop{0%{transform:scale(1);}45%{transform:scale(1.28);}100%{transform:scale(1);}}
@keyframes draw{from{stroke-dashoffset:26;}to{stroke-dashoffset:0;}}

/* číselný stepper */
.stepper{display:flex;align-items:center;gap:2px;flex:0 0 auto;}
.step-btn{
  width:44px;height:44px;border-radius:12px;background:var(--btn-bg);
  font-size:22px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;
}
.step-btn:active{transform:scale(.92);}
.num-input{
  width:56px;height:44px;text-align:center;font-size:17px;font-weight:700;
  background:transparent;border:0;font-variant-numeric:tabular-nums;
  border-radius:10px;
}
.num-input:focus-visible{outline:2px solid var(--accent);}

/* režim úprav */
.habit-row.edit{cursor:grab;}
.habit-row.edit:active{cursor:grabbing;}
.habit-row.dragging{opacity:.4;}
.habit-row.drag-over{outline:2px dashed var(--accent);outline-offset:2px;}
.drag-handle{color:var(--muted);font-size:17px;flex:0 0 auto;letter-spacing:-2px;}
.edit-controls{display:flex;gap:2px;flex:0 0 auto;}
.edit-controls .icon-btn{box-shadow:none;background:transparent;font-size:18px;min-width:42px;}
.habit-row.archived{opacity:.75;}
@media (max-width:540px){
  .habit-row.edit .drag-handle{display:none;}
  .habit-row.edit{padding-left:10px;padding-right:6px;gap:8px;}
  .edit-controls .icon-btn{min-width:40px;}
}

/* ---------- týdenní mřížka ---------- */
.grid-card{padding:10px 6px 12px;}
.wk-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.wk-grid{display:grid;gap:2px 2px;align-items:center;min-width:100%;}
.wk-cell{
  min-height:46px;display:flex;align-items:center;justify-content:center;
  font-size:13px;
}
.wk-cell.name{
  position:sticky;left:0;z-index:1;background:var(--card);
  justify-content:flex-start;gap:5px;padding:0 6px;min-width:0;
}
.wk-cell.name .h-emoji{width:22px;height:22px;flex:0 0 22px;font-size:15px;}
.wk-cell.name .h-emoji.letter{font-size:12px;}
.wk-hname{
  flex:1;min-width:0;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;
  font-weight:500;font-size:12.5px;line-height:1.25;
}
.wk-head{flex-direction:column;gap:0;line-height:1.15;border-radius:10px;}
.wk-head span:first-child{font-size:12px;font-weight:700;color:var(--muted);}
.wk-dnum{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;}
.wk-head.today{background:var(--green-soft);}
.wk-head.today span{color:var(--green);}
.wk-dot{
  width:100%;max-width:46px;height:44px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:12px;font-size:15px;font-weight:700;color:transparent;
}
.wk-dot::before{content:"";position:absolute;}
.wk-dot{position:relative;}
.wk-dot::after{
  content:"";width:26px;height:26px;border-radius:50%;
  border:2px solid var(--line);position:absolute;
  transition:background .15s ease,border-color .15s ease;
}
.wk-dot.on{color:#fff;}
.wk-dot.on::after{background:var(--green);border-color:var(--green);}
.wk-dot span,.wk-dot{z-index:0;}
.wk-dot.on{z-index:0;}
.wk-dot.on{font-size:14px;}
.wk-dot.on{color:#fff;}
.wk-dot.on{text-shadow:none;}
.wk-dot > *{position:relative;z-index:1;}
.wk-num{
  min-width:0;width:100%;max-width:46px;height:44px;border-radius:12px;font-size:12px;font-weight:700;
  font-variant-numeric:tabular-nums;color:var(--muted);background:transparent;
  display:inline-flex;align-items:center;justify-content:center;padding:0 1px;
}
.wk-num.part{background:var(--btn-bg);color:var(--text);}
.wk-num.on{background:var(--green);color:#fff;}
.wk-cell.sum{font-size:11.5px;color:var(--muted);font-variant-numeric:tabular-nums;border-top:1px solid var(--line);min-height:38px;}
.wk-cell.name.sum{font-weight:600;}

/* ---------- měsíční heatmapa ---------- */
.hm-week{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:6px;}
.hm-wd{text-align:center;font-size:12px;font-weight:700;color:var(--muted);}
.hm-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;}
.hm{
  aspect-ratio:1/1;border-radius:9px;display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;
  background:var(--h0);color:var(--text);width:100%;
}
.hm.blank{background:transparent;}
.hm.future{background:transparent;border:1.5px dashed var(--line);color:var(--muted);}
.hm.l1{background:var(--h1);}
.hm.l2{background:var(--h2);}
.hm.l3{background:var(--h3);color:#fff;}
.hm.l4{background:var(--h4);color:#fff;}
.hm.l1,.hm.l2{color:#0b3d1c;}
.hm.l3,.hm.l4{color:#ffffff;}
.hm.today{box-shadow:inset 0 0 0 2.5px var(--accent);}
.hm-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;flex-wrap:wrap;gap:8px;}
.hm-legend{display:inline-flex;align-items:center;gap:4px;font-size:12.5px;color:var(--muted);}
.hm-legend .hm{width:15px;height:15px;aspect-ratio:auto;border-radius:4px;flex:0 0 auto;}
.hm-avg{font-size:13.5px;color:var(--muted);}

/* ---------- statistiky ---------- */
.stat-cards{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:12px;}
@media (min-width:600px){.stat-cards{grid-template-columns:repeat(4,minmax(0,1fr));}}
.stat{
  background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);
  padding:14px 16px;min-width:0;
}
.stat-num{display:block;font-size:26px;font-weight:800;letter-spacing:-.02em;font-variant-numeric:tabular-nums;line-height:1.15;white-space:nowrap;}
.stat-lbl{display:block;font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.3;}
.table-card{padding:8px 4px;overflow-x:auto;}
.stat-table{width:100%;border-collapse:collapse;font-size:14.5px;}
.stat-table th{
  text-align:left;font-size:12px;color:var(--muted);font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;padding:8px 10px;border-bottom:1px solid var(--line);white-space:nowrap;
}
.stat-table td{padding:11px 10px;border-bottom:1px solid var(--line);font-variant-numeric:tabular-nums;}
.stat-table tr:last-child td{border-bottom:0;}
.stat-table th:not(:first-child),.stat-table td:not(:first-child){text-align:right;}
.stat-table td:first-child{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tbl-emoji{margin-right:7px;}
.stat-table tr.dim{color:var(--muted);}

/* ---------- spodní lišta ---------- */
.tabbar{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  background:var(--tabbar-bg);
  -webkit-backdrop-filter:saturate(180%) blur(20px);backdrop-filter:saturate(180%) blur(20px);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom);
}
.tabbar-inner{max-width:680px;margin:0 auto;display:flex;}
.tab-btn{
  flex:1;min-height:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;font-size:12px;font-weight:700;color:var(--muted-bg);white-space:nowrap;min-width:0;overflow:visible;
}
.tab-btn .tab-ico{font-size:22px;line-height:1.2;opacity:.55;transition:opacity .15s,transform .15s;}
.tab-btn.on{color:var(--accent);}
.tab-btn.on .tab-ico{opacity:1;transform:translateY(-1px);}
.tab-center{overflow:visible;}
.tab-day{
  width:54px;height:54px;border-radius:50%;background:var(--accent);color:#fff;
  display:flex;align-items:center;justify-content:center;font-size:25px;font-weight:800;line-height:1;
  margin-top:-28px;border:4px solid var(--bg);flex:0 0 auto;
  box-shadow:0 6px 16px rgba(10,132,255,.38),0 2px 5px rgba(0,0,0,.18);
  transition:transform .12s ease,opacity .15s;
}
.tab-center:not(.on) .tab-day{opacity:.82;}
.tab-center:active .tab-day{transform:scale(.92);}
.tab-center .tab-lbl{font-weight:800;}

/* ---------- kompaktní telefonní režim ---------- */
@media (max-width:440px){
  .habit-row{padding:10px 12px;gap:10px;}
  .habit-row .h-emoji{width:30px;height:30px;flex:0 0 30px;font-size:21px;}
  .h-name{font-size:16px;}
  .step-btn{width:38px;height:42px;font-size:20px;}
  .num-input{width:46px;font-size:16px;}
  .stepper{gap:1px;}
  .edit-controls .icon-btn{min-width:34px;font-size:16px;}
  .stat-table th,.stat-table td{padding-left:7px;padding-right:7px;}
  .stat-table td:first-child{max-width:150px;}
  .view-title{font-size:24px;}
  .tab-btn{font-size:11px;}
}

/* ---------- modální okno ---------- */
.modal-wrap{position:fixed;inset:0;z-index:100;}
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.42);}
.sheet{
  position:absolute;left:0;right:0;bottom:0;max-height:90vh;max-height:90dvh;overflow-y:auto;
  background:var(--card);color:var(--text);border-radius:22px 22px 0 0;
  padding:22px 20px calc(22px + env(safe-area-inset-bottom));
  animation:sheetIn .28s cubic-bezier(.2,.9,.3,1);
}
@keyframes sheetIn{from{transform:translateY(36px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@media (min-width:600px){
  .sheet{
    left:50%;right:auto;bottom:auto;top:50%;transform:translate(-50%,-50%);
    width:460px;border-radius:22px;padding-bottom:22px;
    animation:none;
  }
}
.sheet-title{margin:0 0 16px;font-size:21px;font-weight:800;letter-spacing:-.01em;}
.field{display:block;font-size:13.5px;font-weight:600;color:var(--muted);margin-bottom:14px;}
.field-lbl{display:block;margin-bottom:7px;}
.field input{
  display:block;width:100%;margin-top:6px;
  min-height:46px;padding:10px 13px;font-size:17px;
  background:var(--field-bg);border:1px solid var(--line);border-radius:12px;
}
.field input:focus{border-color:var(--accent);outline:none;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.emoji-row{display:flex;gap:7px;flex-wrap:wrap;margin:-4px 0 16px;}
.emoji-pick{
  width:44px;height:44px;border-radius:12px;background:var(--field-bg);border:1px solid var(--line);
  font-size:22px;display:inline-flex;align-items:center;justify-content:center;
}
.emoji-pick:active{transform:scale(.9);}
.seg{display:flex;background:var(--field-bg);border:1px solid transparent;border-radius:12px;padding:3px;gap:3px;}
.seg.freq{display:grid;grid-template-columns:1fr 1fr;}
.seg-btn{flex:1;min-height:42px;border-radius:9px;font-size:15px;font-weight:600;color:var(--muted);}
.seg.freq .seg-btn{font-size:14px;}
.seg-btn.on{background:var(--card);color:var(--text);box-shadow:var(--shadow);}
.day-picker{display:flex;gap:5px;}
.day-chip{flex:1;min-height:42px;border-radius:10px;border:1.5px solid var(--line);background:var(--field-bg);font-size:13.5px;font-weight:700;color:var(--muted);}
.day-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.wk-dot.off::after{border-style:dashed;opacity:.5;}
.wk-off{opacity:.45;}
.wk-hfreq{display:block;font-size:10.5px;font-weight:600;color:var(--muted);}
.wk-okwk{color:var(--green);}
.cal-seg{max-width:260px;margin:0 auto 12px;}
.hm.vacday{background:transparent;border:1.5px dashed var(--line);color:var(--muted);}
.vac-card{display:flex;align-items:center;gap:12px;padding:12px 14px;}
.vac-emo{width:40px;height:40px;border-radius:12px;background:var(--field-bg);display:inline-flex;align-items:center;justify-content:center;font-size:21px;flex:0 0 auto;}
.vac-tx{display:flex;flex-direction:column;gap:1px;font-size:14px;color:var(--muted);min-width:0;line-height:1.35;}
.vac-tx strong{color:var(--text);font-size:14.5px;}
.vac-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 0 5px 2px;border-bottom:1px solid var(--line);font-size:15px;}
.vac-row:last-child{border-bottom:0;}
.vac-row .icon-btn{box-shadow:none;background:transparent;font-size:17px;min-width:40px;min-height:40px;}
.plan-text{font-size:15px;line-height:1.55;margin:0;word-break:break-word;}
.pl-p{margin:7px 0;}
.pl-p:first-child,.pl-li:first-child{margin-top:0;}
.pl-p:last-child,.pl-li:last-child{margin-bottom:0;}
.pl-li{display:flex;gap:9px;margin:6px 0;align-items:flex-start;font-size:15px;line-height:1.5;}
.pl-dot{flex:0 0 auto;color:var(--accent);font-weight:700;}
.pl-li.sub{margin-left:20px;font-size:14px;color:var(--text);}
.pl-li.sub .pl-dot{color:var(--muted);font-weight:400;}
.pl-tx{min-width:0;word-break:break-word;}

.meal-lbl{font-size:12.5px;font-weight:800;color:var(--muted);margin:0 2px 7px;text-transform:uppercase;letter-spacing:.06em;}

.hm{position:relative;}
.hm-nd{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:var(--accent);}

.wk-dot.frz::after{background:#5ac8fa;border-color:#5ac8fa;}
.wk-num.frz{color:#5ac8fa;font-weight:800;font-size:15px;}

  width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.22);color:#fff;
  display:inline-flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto;
}

#fx{position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;}
.fx-p{position:absolute;top:-30px;animation-name:fxfall;animation-timing-function:linear;animation-fill-mode:forwards;}
@keyframes fxfall{to{transform:translateY(115vh) rotate(520deg);}}

.theme-lbl{display:block;font-size:12.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:14px 2px 8px;}

/* ============ Utility ============ */
const $ = sel => document.querySelector(sel);

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function uid(){
  if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
  return 'id-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
}
function plural(n, one, few, many){
  n = Math.abs(n);
  if (n === 1) return one;
  if (n >= 2 && n <= 4) return few;
  return many;
}
function fmtNum(n){
  if (!isFinite(n)) return '0';
  const r = Math.round(n * 100) / 100;
  return String(r).replace('.', ',');
}
function parseNum(s){
  if (typeof s !== 'string') return NaN;
  s = s.trim().replace(',', '.');
  if (s === '') return NaN;
  return Number(s);
}
function today(){
  const d = new Date();
  return new Date(d.getFullYear(), d.getMonth(), d.getDate());
}
function addDays(d, n){
  return new Date(d.getFullYear(), d.getMonth(), d.getDate() + n);
}
function dateKey(d){
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return d.getFullYear() + '-' + m + '-' + day;
}
function parseKey(k){
  const [y, m, d] = k.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function sameDay(a, b){
  return a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
}
function startOfWeek(d){
  return addDays(d, -((d.getDay() + 6) % 7)); // pondělí
}
function firstOfMonth(d){
  return new Date(d.getFullYear(), d.getMonth(), 1);
}
function cap(s){
  return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
}
const FMT_FULL   = new Intl.DateTimeFormat('cs-CZ', { weekday:'long', day:'numeric', month:'long' });
const FMT_FULL_Y = new Intl.DateTimeFormat('cs-CZ', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
const FMT_MONTH  = new Intl.DateTimeFormat('cs-CZ', { month:'long', year:'numeric' });
function fmtDateFull(d){
  const f = d.getFullYear() === today().getFullYear() ? FMT_FULL : FMT_FULL_Y;
  return cap(f.format(d));
}
function fmtWeekRange(mon){
  const sun = addDays(mon, 6);
  const dm = x => x.getDate() + '. ' + (x.getMonth() + 1) + '.';
  const yr = sun.getFullYear() !== today().getFullYear() ? ' ' + sun.getFullYear() : '';
  return dm(mon) + ' – ' + dm(sun) + yr;
}

/* ============ Validace a normalizace importu ============ */
function validateData(obj){
  if (!obj || typeof obj !== 'object' || Array.isArray(obj)) return 'Soubor neobsahuje platný objekt dat.';
  if (!Array.isArray(obj.habits)) return 'Chybí seznam návyků („habits“).';
  const ids = new Set();
  for (let i = 0; i < obj.habits.length; i++){
    const h = obj.habits[i];
    if (!h || typeof h !== 'object') return 'Návyk č. ' + (i + 1) + ' není platný objekt.';
    if (typeof h.id !== 'string' && typeof h.id !== 'number') return 'Návyk č. ' + (i + 1) + ' nemá platné ID.';
    if (ids.has(String(h.id))) return 'Duplicitní ID návyku: ' + h.id;
    ids.add(String(h.id));
    if (typeof h.name !== 'string' || !h.name.trim()) return 'Návyk č. ' + (i + 1) + ' nemá název.';
    if (h.type !== 'check' && h.type !== 'number') return 'Návyk „' + h.name + '“ má neznámý typ (povoleno: check, number).';
    if (h.type === 'number' && (typeof h.goal !== 'number' || !isFinite(h.goal) || h.goal <= 0)) return 'Návyk „' + h.name + '“ nemá platný číselný cíl.';
    if (h.freq != null){
      const f = h.freq;
      if (typeof f !== 'object' || Array.isArray(f)) return 'Návyk „' + h.name + '“ má neplatnou frekvenci.';
      if (['daily', 'days', 'weekly', 'monthly'].indexOf(f.type) === -1) return 'Návyk „' + h.name + '“ má neznámou frekvenci.';
      if (f.type === 'days' && (!Array.isArray(f.days) || !f.days.length || f.days.some(d => !Number.isInteger(d) || d < 0 || d > 6))) return 'Návyk „' + h.name + '“ má neplatné dny v týdnu.';
    }
    if (h.timerMin != null && !(Number.isInteger(h.timerMin) && h.timerMin >= 1 && h.timerMin <= 600)) return 'Návyk „' + h.name + '“ má neplatný časovač.';
    if (h.vacations != null){
      if (!Array.isArray(h.vacations)) return 'Návyk „' + h.name + '“ má neplatné prázdniny.';
      for (const v of h.vacations){
        if (!v || typeof v !== 'object' || !DATE_RE.test(String(v.from)) || !DATE_RE.test(String(v.to)) || String(v.from) > String(v.to)) return 'Návyk „' + h.name + '“ má neplatné rozmezí prázdnin.';
      }
    }
  }
  if (obj.meals != null){
    if (typeof obj.meals !== 'object' || Array.isArray(obj.meals)) return 'Jídelníček („meals“) má špatný formát.';
    for (const k of Object.keys(obj.meals)){
      if (!DATE_RE.test(k) || dateKey(parseKey(k)) !== k) return 'Neplatné datum v jídelníčku: ' + k;
      const v = obj.meals[k];
      if (typeof v === 'string') continue; // starší formát
      if (!v || typeof v !== 'object' || Array.isArray(v)) return 'Záznam jídelníčku pro ' + k + ' má špatný formát.';
      for (const f of ['b', 'l', 'd', 'note']){
        if (v[f] != null && typeof v[f] !== 'string') return 'Záznam jídelníčku pro ' + k + ' má neplatné pole.';
      }
      if (v.sn != null && (!Array.isArray(v.sn) || v.sn.some(x => typeof x !== 'string'))) return 'Svačiny pro ' + k + ' mají špatný formát.';
    }
  }
  if (obj.theme != null && (typeof obj.theme !== 'object' || Array.isArray(obj.theme))) return 'Vzhled („theme“) má špatný formát.';
  if (obj.notes != null){
    if (typeof obj.notes !== 'object' || Array.isArray(obj.notes)) return 'Poznámky („notes“) mají špatný formát.';
    for (const k of Object.keys(obj.notes)){
      if (!DATE_RE.test(k)) return 'Neplatné datum v poznámkách: ' + k;
      const day = obj.notes[k];
      if (!day || typeof day !== 'object' || Array.isArray(day)) return 'Poznámky pro ' + k + ' mají špatný formát.';
      for (const hid of Object.keys(day)){
        if (typeof day[hid] !== 'string') return 'Poznámka pro ' + k + ' není text.';
      }
    }
  }
  if (obj.milestones != null && (typeof obj.milestones !== 'object' || Array.isArray(obj.milestones))) return 'Milníky mají špatný formát.';
  if (obj.entries != null){
    if (typeof obj.entries !== 'object' || Array.isArray(obj.entries)) return 'Záznamy („entries“) mají špatný formát.';
    for (const k of Object.keys(obj.entries)){
      if (!/^\d{4}-\d{2}-\d{2}$/.test(k) || dateKey(parseKey(k)) !== k) return 'Neplatné datum v záznamech: ' + k;
      const day = obj.entries[k];
      if (!day || typeof day !== 'object' || Array.isArray(day)) return 'Záznam pro ' + k + ' má špatný formát.';
      for (const hid of Object.keys(day)){
        const v = day[hid];
        if (v !== true && !(typeof v === 'number' && isFinite(v) && v >= 0)) return 'Neplatná hodnota v záznamu ' + k + '.';
      }
    }
  }
  if (obj.plan != null && typeof obj.plan !== 'string') return 'Plán („plan“) má špatný formát.';
  return null; // OK
}
function normalizeData(obj){
  const out = {
    version: 1,
    habits: [],
    entries: {},
    meals: {},
    notes: {},
    milestones: {},
    hideDone: !!obj.hideDone,
    theme: normTheme(obj.theme || (typeof obj.bg === 'string' && LEGACY_BG_IDS[obj.bg] ? { bg: LEGACY_BG_IDS[obj.bg] } : null)),
    plan: typeof obj.plan === 'string' ? obj.plan.slice(0, 50000) : DEFAULT_PLAN
  };
  const convertedWork = new Set();
  obj.habits.forEach((h, i) => {
    const nh = {
      id: String(h.id),
      name: String(h.name).trim().slice(0, 60),
      emoji: typeof h.emoji === 'string' ? h.emoji.slice(0, 8) : '',
      type: h.type,
      goal: h.type === 'number' ? Math.round(h.goal * 100) / 100 : null,
      unit: typeof h.unit === 'string' ? h.unit.trim().slice(0, 20) : '',
      archived: !!h.archived,
      order: typeof h.order === 'number' && isFinite(h.order) ? h.order : i,
      createdAt: typeof h.createdAt === 'number' ? h.createdAt : Date.now(),
      freq: normFreq(h.freq),
      vacations: normVacs(h.vacations),
      timerMin: (Number.isInteger(h.timerMin) && h.timerMin >= 1 && h.timerMin <= 600) ? h.timerMin : null
    };
    // jednorázová migrace: výchozí Práce (ano/ne denně) → 85 h měsíčně, součtově
    if (nh.name === 'Práce' && nh.type === 'check' && nh.freq.type === 'daily'){
      nh.type = 'number'; nh.goal = 85; nh.unit = 'h'; nh.freq = { type: 'monthly' };
      convertedWork.add(nh.id);
    }
    out.habits.push(nh);
  });
  if (out.plan === LEGACY_PLAN_1 || out.plan === LEGACY_PLAN_2) out.plan = DEFAULT_PLAN; // nezměněný výchozí plán → aktuální verze
  if (obj.meals){
    for (const k of Object.keys(obj.meals)){
      const m = normMeal(obj.meals[k]);
      if (m) out.meals[k] = m;
    }
  }
  if (obj.notes){
    for (const k of Object.keys(obj.notes)){
      if (!DATE_RE.test(k) || !obj.notes[k] || typeof obj.notes[k] !== 'object') continue;
      const day = {};
      for (const hid of Object.keys(obj.notes[k])){
        const t = obj.notes[k][hid];
        if (typeof t === 'string' && t.trim()) day[String(hid)] = t.slice(0, 500);
      }
      if (Object.keys(day).length) out.notes[k] = day;
    }
  }
  if (obj.milestones && typeof obj.milestones === 'object'){
    for (const id of Object.keys(obj.milestones)){
      const v = obj.milestones[id];
      if (typeof v === 'string' && DATE_RE.test(v)) out.milestones[String(id).slice(0, 40)] = v;
    }
  }
  if (obj.entries){
    for (const k of Object.keys(obj.entries)){
      const src = obj.entries[k], day = {};
      for (const hid of Object.keys(src)){
        const v = src[hid];
        if (v === true && convertedWork.has(String(hid))) continue; // fajfky staré Práce → v hodinách nemají smysl
        if (v === true) day[String(hid)] = true;
        else if (typeof v === 'number' && v > 0) day[String(hid)] = Math.round(v * 100) / 100;
      }
      if (Object.keys(day).length) out.entries[k] = day;
    }
  }
  return out;
}

/* ============ Záznamy ============ */
function getVal(key, habitId){
  const day = data.entries[key];
  return day ? day[habitId] : undefined;
}
function setVal(key, habitId, value){
  const isTodayKey = key === dateKey(today());
  const before = isTodayKey ? dayStats(key).pct : -1;
  let day = data.entries[key];
  if (value === undefined || value === false || value === 0 || value === null){
    if (day){
      delete day[habitId];
      if (!Object.keys(day).length) delete data.entries[key];
    }
  } else {
    if (!day) day = data.entries[key] = {};
    day[habitId] = value;
  }
  save();
  if (isTodayKey && before > -1 && before < 100){
    const after = dayStats(key);
    if (after.total && after.pct === 100) celebrate('🎉 Perfektní den — vše splněno!');
  }
}
function isDone(habit, key){
  const v = getVal(key, habit.id);
  if (v === undefined) return false;
  if (habit.type === 'check') return v === true || (typeof v === 'number' && v > 0);
  const n = v === true ? (habit.goal || 1) : v;
  return typeof n === 'number' && n >= (habit.goal || 1);
}
function numVal(habit, key){
  const v = getVal(key, habit.id);
  if (typeof v === 'number') return v;
  if (v === true) return habit.goal || 1;
  return 0;
}
function activeHabits(){
  return data.habits.filter(h => !h.archived).sort((a, b) => a.order - b.order);
}
function archivedHabits(){
  return data.habits.filter(h => h.archived).sort((a, b) => a.order - b.order);
}
function habitById(id){
  return data.habits.find(h => h.id === id);
}

/* ============ Frekvence návyků ============ */
function weekdayIdx(d){
  return (d.getDay() + 6) % 7; // Po=0 … Ne=6
}
function habitFreq(h){
  return h && h.freq && h.freq.type ? h.freq : { type: 'daily' };
}
function normFreq(f){
  if (!f || typeof f !== 'object' || Array.isArray(f)) return { type: 'daily' };
  if (f.type === 'days'){
    const days = Array.isArray(f.days)
      ? [...new Set(f.days.filter(d => Number.isInteger(d) && d >= 0 && d <= 6))].sort((a, b) => a - b)
      : [];
    return days.length ? { type: 'days', days } : { type: 'daily' };
  }
  if (f.type === 'weekly' || f.type === 'monthly') return { type: f.type };
  return { type: 'daily' };
}
function isPeriodic(h){
  const t = habitFreq(h).type;
  return t === 'weekly' || t === 'monthly';
}
function isScheduled(h, d){
  if (onVacation(h, d)) return false; // prázdniny = nenaplánováno
  const f = habitFreq(h);
  if (f.type === 'daily') return true;
  if (f.type === 'days') return f.days.indexOf(weekdayIdx(d)) !== -1;
  return false; // týdenní/měsíční nemají pevné dny
}

/* ============ Prázdniny ============ */
function vacList(h){
  return Array.isArray(h.vacations) ? h.vacations : [];
}
function normVacs(v){
  if (!Array.isArray(v)) return [];
  const out = [];
  for (const r of v){
    if (!r || typeof r !== 'object') continue;
    const from = String(r.from || ''), to = String(r.to || '');
    if (!DATE_RE.test(from) || !DATE_RE.test(to)) continue;
    if (dateKey(parseKey(from)) !== from || dateKey(parseKey(to)) !== to) continue;
    if (from > to) continue;
    out.push({ from, to });
    if (out.length >= 100) break;
  }
  out.sort((a, b) => (a.from < b.from ? -1 : a.from > b.from ? 1 : 0));
  return out;
}
function onVacation(h, d){
  const k = dateKey(d);
  return vacList(h).some(v => v.from <= k && k <= v.to);
}
function vacUntil(h, d){
  const k = dateKey(d);
  const r = vacList(h).find(v => v.from <= k && k <= v.to);
  return r ? r.to : null;
}
function weekAllVacation(h, mon){
  for (let i = 0; i < 7; i++){
    if (!onVacation(h, addDays(mon, i))) return false;
  }
  return true;
}
function monthAllVacation(h, first){
  const days = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
  for (let i = 1; i <= days; i++){
    if (!onVacation(h, new Date(first.getFullYear(), first.getMonth(), i))) return false;
  }
  return true;
}
function periodicPaused(h, refDate){
  const f = habitFreq(h);
  if (f.type === 'weekly') return weekAllVacation(h, startOfWeek(refDate));
  if (f.type === 'monthly') return monthAllVacation(h, firstOfMonth(refDate));
  return false;
}

/* ============ Jídelníček ============ */
function normMeal(v){
  if (typeof v === 'string') v = { note: v }; // starší jednopolíčkový formát
  if (!v || typeof v !== 'object' || Array.isArray(v)) return null;
  const s = x => typeof x === 'string' ? x.slice(0, 2000) : '';
  const m = { b: s(v.b), l: s(v.l), d: s(v.d), sn: [], note: s(v.note) };
  if (Array.isArray(v.sn)){
    for (const it of v.sn){
      if (typeof it === 'string' && it.trim()) m.sn.push(it.slice(0, 500));
      if (m.sn.length >= 12) break;
    }
  }
  if (!m.b.trim() && !m.l.trim() && !m.d.trim() && !m.note.trim() && !m.sn.length) return null;
  return m;
}
function mealObj(key){
  return normMeal(data.meals[key]) || { b: '', l: '', d: '', sn: [], note: '' };
}
function mealHistory(field){
  const map = new Map();
  const add = (txt, k) => {
    const t = String(txt || '').trim();
    if (!t) return;
    const e = map.get(t) || { t, n: 0, last: '' };
    e.n++;
    if (k > e.last) e.last = k;
    map.set(t, e);
  };
  for (const k of Object.keys(data.meals)){
    const m = normMeal(data.meals[k]);
    if (!m) continue;
    if (field === 'sn') m.sn.forEach(s => add(s, k));
    else add(m[field], k);
  }
  return [...map.values()].sort((a, b) => b.n - a.n || (a.last < b.last ? 1 : -1)).slice(0, 30);
}

/* ============ Vzhled (barvy) ============ */

const THEME_CARD = ['#ffffff','#f7f7fa','#fbf7ee','#eef7f1','#edf4fc','#f2effb','#fdf1f4','#fdf5ec','#1c1c1e','#222329','#17181d','#182236','#1e2b24','#2a1e2e','#2e2117','#223140'];
const THEME_DEFAULT = { bg: '#f2f2f7', card: '#ffffff', text: 'auto' };
const LEGACY_BG_IDS = { default: '#f2f2f7', cream: '#f6f1e7', mint: '#eaf5ee', sky: '#e9f1fa', lavender: '#efecf8', rose: '#f9edf0', peach: '#fbf0e6' };
const HEX_RE = /^#[0-9a-f]{6}$/i;
function lum(hex){
  const n = parseInt(hex.slice(1), 16);
  return (0.2126 * ((n >> 16) & 255) + 0.7152 * ((n >> 8) & 255) + 0.0722 * (n & 255)) / 255;
}
function normTheme(t){
  const src = t && typeof t === 'object' ? t : {};
  return {
    bg: (typeof src.bg === 'string' && HEX_RE.test(src.bg)) ? src.bg.toLowerCase() : THEME_DEFAULT.bg,
    card: (typeof src.card === 'string' && HEX_RE.test(src.card)) ? src.card.toLowerCase() : THEME_DEFAULT.card,
    text: ['auto', 'dark', 'light'].includes(src.text) ? src.text : 'auto'
  };
}
function applyTheme(){
  const t = normTheme(data && data.theme);
  const bgDark = lum(t.bg) < 0.5;
  const cardDark = t.text === 'auto' ? lum(t.card) < 0.5 : t.text === 'light';
  const R = document.documentElement.style;
  R.setProperty('--bg', t.bg);
  R.setProperty('--card', t.card);
  R.setProperty('--text', cardDark ? '#f2f2f7' : '#1c1c1e');
  R.setProperty('--muted', cardDark ? '#9d9da4' : '#8a8a8e');
  R.setProperty('--line', cardDark ? 'rgba(255,255,255,.14)' : 'rgba(0,0,0,.10)');
  R.setProperty('--btn-bg', cardDark ? 'rgba(255,255,255,.13)' : 'rgba(0,0,0,.06)');
  R.setProperty('--field-bg', cardDark ? 'rgba(255,255,255,.09)' : 'rgba(0,0,0,.05)');
  R.setProperty('--h0', cardDark ? 'rgba(255,255,255,.12)' : '#e4e4e9');
  R.setProperty('--green-soft', cardDark ? 'rgba(48,209,88,.22)' : 'rgba(52,199,89,.13)');
  R.setProperty('--shadow', cardDark ? '0 1px 3px rgba(0,0,0,.4)' : '0 1px 2px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04)');
  R.setProperty('--text-bg', bgDark ? '#f2f2f7' : '#1c1c1e');
  R.setProperty('--muted-bg', bgDark ? '#a3a3ab' : '#8a8a8e');
  R.setProperty('--tabbar-bg', bgDark ? 'rgba(18,19,22,.9)' : 'rgba(249,249,251,.9)');
}

/* ============ Poznámky ke dni ============ */
function getNote(key, hid){
  return (data.notes[key] && data.notes[key][hid]) || '';
}
function setNote(key, hid, text){
  const t = String(text || '').trim().slice(0, 500);
  if (t){
    if (!data.notes[key]) data.notes[key] = {};
    data.notes[key][hid] = t;

/* ============ Zmrazení streaku (1× týdně) ============ */
function weekMissDone(h, mon){
  const t = today();
  let miss = 0, done = 0;
  for (let i = 0; i < 7; i++){
    const d = addDays(mon, i);
    if (!isScheduled(h, d)) continue;
    if (isDone(h, dateKey(d))) done++;
    else if (d < t) miss++;
  }
  return { miss, done };
}
function prevScheduledDone(h, d){
  let p = addDays(d, -1), guard = 0;
  while (guard++ < 400){
    if (isScheduled(h, p)) return isDone(h, dateKey(p));
    p = addDays(p, -1);
  }
  return false;
}
function frozenDay(h, d){
  if (isPeriodic(h)) return false;
  if (d >= today()) return false;
  if (!isScheduled(h, d) || isDone(h, dateKey(d))) return false;
  if (!prevScheduledDone(h, d)) return false; // mrazí se jen rozjetá série
  return weekMissDone(h, startOfWeek(d)).miss === 1; // a max 1 prošvih v témže týdnu
}

/* ============ Milníky ============ */
function bestLongestDaily(){
  let m = 0;
  for (const h of data.habits){
    if (isPeriodic(h)) continue;
    const s = longestStreak(h);
    if (s > m) m = s;
  }
  return m;
}
function totalDone(){
  let c = 0;
  for (const k of Object.keys(data.entries)){
    for (const hid of Object.keys(data.entries[k])){
      const h = habitById(hid);
      if (h && isDone(h, k)) c++;
    }
  }
  return c;
}
function totalHours(){
  let s = 0;
  const hrs = data.habits.filter(h => h.type === 'number' && String(h.unit).trim().toLowerCase() === 'h');
  for (const k of Object.keys(data.entries)){
    for (const h of hrs){
      const v = getVal(k, h.id);
      if (typeof v === 'number') s += v;
    }
  }
  return s;
}
function perfectDays(){
  let c = 0;
  for (const k of Object.keys(data.entries)){
    const s = dayStats(k);
    if (s.total && s.done === s.total) c++;
  }
  return c;
}
const MILESTONES = [

let msGuard = false;
function checkMilestones(){
  if (msGuard || !data) return;
  msGuard = true;
  const got = [];
  for (const m of MILESTONES){

/* ============ Časovač ============ */
let timerState = null;
let timerInt = null;
function timerPill(){
  let p = document.getElementById('timerpill');
  if (!p){
    p = document.createElement('div');
    p.id = 'timerpill';
    p.innerHTML = '<span id="tp-txt"></span><button data-action="cancelTimer" aria-label="Zrušit časovač">✕</button>';
    document.body.appendChild(p);
  }
  return p;
}
function startTimer(h, key){
  timerState = { id: h.id, key, name: h.name, endsAt: Date.now() + h.timerMin * 60000 };
  timerPill().hidden = false;
  if (!timerInt) timerInt = setInterval(timerTick, 500);
  timerTick();
}
function stopTimer(){
  timerState = null;
  if (timerInt){ clearInterval(timerInt); timerInt = null; }
  const p = document.getElementById('timerpill');
  if (p) p.hidden = true;
}
function timerTick(){
  if (!timerState) return;
  const rem = timerState.endsAt - Date.now();
  if (rem <= 0){
    const { id, key, name } = timerState;
    stopTimer();
    const h = habitById(id);
    if (h && h.type === 'check' && !isDone(h, key)){
      popRef = { id, key };
      setVal(key, id, true);
      toast('⏱️ ' + name + ' — hotovo, odškrtnuto ✓');
    } else {
      toast('⏱️ ' + name + ' — čas doběhl');
    }
    render();
    return;
  }
  const sec = Math.ceil(rem / 1000);
  const mm = Math.floor(sec / 60), ss = sec % 60;
  const el = document.getElementById('tp-txt');
  if (el) el.textContent = '⏱️ ' + timerState.name + ' · ' + mm + ':' + String(ss).padStart(2, '0');
}
function freqLabel(h){
  const f = habitFreq(h);
  if (f.type === 'days') return f.days.map(i => WD[i]).join(' · ');
  return FREQ_NAMES[f.type];
}
function weekSum(h, mon){
  let s = 0;
  for (let i = 0; i < 7; i++){
    const v = getVal(dateKey(addDays(mon, i)), h.id);
    if (typeof v === 'number') s += v;
  }
  return Math.round(s * 100) / 100;
}
function monthSum(h, first){
  const days = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
  let s = 0;
  for (let i = 1; i <= days; i++){
    const v = getVal(dateKey(new Date(first.getFullYear(), first.getMonth(), i)), h.id);
    if (typeof v === 'number') s += v;
  }
  return Math.round(s * 100) / 100;
}
function doneInWeek(h, mon){
  if (h.type === 'number'){ // číselný týdenní cíl se sčítá přes celý týden
    return weekSum(h, mon) >= (h.goal || 1) ? dateKey(mon) : null;
  }
  for (let i = 0; i < 7; i++){
    const k = dateKey(addDays(mon, i));
    if (isDone(h, k)) return k;
  }
  return null;
}
function doneInMonth(h, first){
  if (h.type === 'number'){ // číselný měsíční cíl se sčítá přes celý měsíc
    return monthSum(h, first) >= (h.goal || 1) ? dateKey(first) : null;
  }
  const days = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
  for (let i = 1; i <= days; i++){
    const k = dateKey(new Date(first.getFullYear(), first.getMonth(), i));
    if (isDone(h, k)) return k;
  }
  return null;
}
function fmtKeyShort(k){
  const d = parseKey(k);
  return WD[weekdayIdx(d)] + ' ' + d.getDate() + '. ' + (d.getMonth() + 1) + '.';
}

/* ============ Streaky a statistiky ============ */
function currentStreak(habit){
  const f = habitFreq(habit);
  if (f.type === 'weekly'){
    let mon = startOfWeek(today());
    let n = 0, guard = 0, current = true;
    while (guard++ < 3000){
      if (doneInWeek(habit, mon)){ n++; mon = addDays(mon, -7); current = false; continue; }
      if (weekAllVacation(habit, mon)){ mon = addDays(mon, -7); current = false; continue; } // prázdniny nepřerušují
      if (current){ current = false; mon = addDays(mon, -7); continue; } // běžící týden streak nepřerušuje
      break;
    }
    return n;
  }
  if (f.type === 'monthly'){
    let first = firstOfMonth(today());
    let n = 0, guard = 0, current = true;
    while (guard++ < 1200){
      if (doneInMonth(habit, first)){ n++; first = new Date(first.getFullYear(), first.getMonth() - 1, 1); current = false; continue; }
      if (monthAllVacation(habit, first)){ first = new Date(first.getFullYear(), first.getMonth() - 1, 1); current = false; continue; }
      if (current){ current = false; first = new Date(first.getFullYear(), first.getMonth() - 1, 1); continue; }
      break;
    }
    return n;
  }
  let d = today();
  if (isScheduled(habit, d) && !isDone(habit, dateKey(d))) d = addDays(d, -1); // dnešek zatím nesplněný streak nepřerušuje
  let n = 0, guard = 0;
  while (guard++ < 20000){
    if (!isScheduled(habit, d)){ d = addDays(d, -1); continue; } // nenaplánované a prázdninové dny se přeskakují
    if (!isDone(habit, dateKey(d))){
      if (frozenDay(habit, d)){ d = addDays(d, -1); continue; } // 🧊 zmrazení — max 1 prošvih týdně
      break;
    }
    n++;
    d = addDays(d, -1);
  }
  return n;
}
function longestStreak(habit){
  const f = habitFreq(habit);
  const doneDays = Object.keys(data.entries)
    .filter(k => isDone(habit, k))
    .map(parseKey)
    .sort((a, b) => a - b);
  if (!doneDays.length) return 0;
  if (f.type === 'weekly'){
    let mon = startOfWeek(doneDays[0]);
    const end = startOfWeek(today());
    let best = 0, run = 0, guard = 0;
    while (mon <= end && guard++ < 3000){
      if (doneInWeek(habit, mon)){ run++; if (run > best) best = run; }
      else if (!weekAllVacation(habit, mon)) run = 0; // prázdninový týden nepřerušuje
      mon = addDays(mon, 7);
    }
    return best;
  }
  if (f.type === 'monthly'){
    let first = firstOfMonth(doneDays[0]);
    const end = firstOfMonth(today());
    let best = 0, run = 0, guard = 0;
    while (first <= end && guard++ < 1200){
      if (doneInMonth(habit, first)){ run++; if (run > best) best = run; }
      else if (!monthAllVacation(habit, first)) run = 0;
      first = new Date(first.getFullYear(), first.getMonth() + 1, 1);
    }
    return best;
  }
  let best = 0, run = 0, guard = 0;
  const end = today();
  for (let d = doneDays[0]; d <= end && guard++ < 20000; d = addDays(d, 1)){
    if (!isScheduled(habit, d)) continue; // nenaplánované a prázdninové dny se přeskakují
    if (isDone(habit, dateKey(d))){ run++; if (run > best) best = run; }
    else if (!frozenDay(habit, d)) run = 0; // 🧊 zmrazený den sérii nepřeruší
  }
  return best;
}
function scheduledFor(d){
  return activeHabits().filter(h => isScheduled(h, d));
}
function dayStats(key){
  const hs = scheduledFor(parseKey(key));
  if (!hs.length) return { done: 0, total: 0, pct: 0 };
  const done = hs.filter(h => isDone(h, key)).length;
  return { done, total: hs.length, pct: Math.round(done / hs.length * 100) };
}
function rateOverDays(n){
  let done = 0, total = 0;
  for (let i = 0; i < n; i++){
    const s = dayStats(dateKey(addDays(today(), -i)));
    done += s.done;
    total += s.total;
  }
  return total ? Math.round(done / total * 100) : 0;
}
function habitRate(habit){
  const f = habitFreq(habit);
  if (f.type === 'weekly'){
    let done = 0, total = 0;
    for (let i = 1; i <= 12 && total < 4; i++){ // poslední 4 hodnotitelné uzavřené týdny
      const mon = addDays(startOfWeek(today()), -7 * i);
      if (weekAllVacation(habit, mon)) continue;
      total++;
      if (doneInWeek(habit, mon)) done++;
    }
    return total ? Math.round(done / total * 100) : 0;
  }
  if (f.type === 'monthly'){
    let done = 0, total = 0;
    const t = today();
    for (let i = 1; i <= 9 && total < 3; i++){ // poslední 3 hodnotitelné uzavřené měsíce
      const first = new Date(t.getFullYear(), t.getMonth() - i, 1);
      if (monthAllVacation(habit, first)) continue;
      total++;
      if (doneInMonth(habit, first)) done++;
    }
    return total ? Math.round(done / total * 100) : 0;
  }
  let done = 0, total = 0;
  for (let i = 0; i < 30; i++){
    const d = addDays(today(), -i);
    if (!isScheduled(habit, d)) continue;
    total++;
    if (isDone(habit, dateKey(d))) done++;
  }
  return total ? Math.round(done / total * 100) : 0;
}

  const status = done
    ? '✓ splněno' + (scopeDone === key ? '' : ' — ' + fmtKeyShort(scopeDone))

    return '<div class="habit-row check' + (done ? ' done' : '') + '" role="checkbox" aria-checked="' + done + '" tabindex="0" data-action="rowToggle" data-id="' + esc(h.id) + '" aria-label="' + esc(h.name) + '">'

      + '</div>';
  }
  const val = numVal(h, key);
  const goal = h.goal || 1;
  const scopeSum = f.type === 'weekly' ? weekSum(h, startOfWeek(parseKey(key))) : monthSum(h, firstOfMonth(parseKey(key)));
  const scopeName = f.type === 'weekly' ? 'tento týden' : 'tento měsíc';
  const pct = Math.max(0, Math.min(100, Math.round(scopeSum / goal * 100)));
  const numStatus = fmtNum(scopeSum) + ' / ' + fmtNum(goal) + (h.unit ? ' ' + esc(h.unit) : '') + ' ' + scopeName
    + (val > 0 ? ' · dnes ' + fmtNum(val) : '')
    + (scopeSum >= goal ? ' ✓' : '');
  return '<div class="habit-row num' + (scopeSum >= goal ? ' done' : '') + '" data-id="' + esc(h.id) + '">'
    + '<span class="pop-wrap' + (pop ? ' pop' : '') + '">' + habitBadge(h) + '</span>'
    + '<span class="h-main">'
    +   '<span class="h-name">' + esc(h.name) + noteDot + '</span>'
    +   '<span class="h-meta"><span class="h-goal">' + numStatus + '</span></span>'
    +   '<span class="mini-bar"><span style="width:' + pct + '%"></span></span>'
    + '</span>'
    + streakBadge(h)
    + '<span class="stepper">'
    +   '<button class="step-btn" data-action="dec" data-id="' + esc(h.id) + '" aria-label="Ubrat">−</button>'
    +   '<input class="num-input" inputmode="decimal" data-id="' + esc(h.id) + '" value="' + fmtNum(val) + '" aria-label="Hodnota – ' + esc(h.name) + '">'
    +   '<button class="step-btn" data-action="inc" data-id="' + esc(h.id) + '" aria-label="Přidat">＋</button>'
    + '</span>'
    + '</div>';
}
function editRow(h, idx, count){
  const goalTxt = h.type === 'number' ? 'cíl ' + fmtNum(h.goal) + (h.unit ? ' ' + esc(h.unit) : '') : 'ano / ne';
  const vacNow = vacUntil(h, today());
  const meta = goalTxt + ' · ' + esc(freqLabel(h)) + (vacNow ? ' · 🏖️ do ' + fmtKeyShort(vacNow) : '');
  return '<div class="habit-row edit" draggable="true" data-idx="' + idx + '" data-id="' + esc(h.id) + '">'
    + '<span class="drag-handle" title="Přetáhnout" aria-hidden="true">⠿</span>'
    + habitBadge(h)
    + '<span class="h-main"><span class="h-name">' + esc(h.name) + '</span><span class="h-meta">' + meta + '</span></span>'
    + '<span class="edit-controls">'
    +   '<button class="icon-btn" data-action="moveUp" data-id="' + esc(h.id) + '" aria-label="Posunout nahoru"' + (idx === 0 ? ' disabled' : '') + '>↑</button>'
    +   '<button class="icon-btn" data-action="moveDown" data-id="' + esc(h.id) + '" aria-label="Posunout dolů"' + (idx === count - 1 ? ' disabled' : '') + '>↓</button>'
    +   '<button class="icon-btn" data-action="vacHabit" data-id="' + esc(h.id) + '" aria-label="Prázdniny">🏖️</button>'
    +   '<button class="icon-btn" data-action="editHabit" data-id="' + esc(h.id) + '" aria-label="Upravit">✏️</button>'
    +   '<button class="icon-btn" data-action="confirmDelete" data-id="' + esc(h.id) + '" aria-label="Smazat">🗑️</button>'
    + '</span>'
    + '</div>';
}
function renderDay(){
  const key = dateKey(selectedDate);
  const isToday = sameDay(selectedDate, today());
  const hs = activeHabits();
  const dayHs = hs.filter(h => !isPeriodic(h) && isScheduled(h, selectedDate));
  const offCnt = hs.filter(h => !isPeriodic(h) && !isScheduled(h, selectedDate) && !onVacation(h, selectedDate)).length;
  const weekHs = hs.filter(h => habitFreq(h).type === 'weekly' && !periodicPaused(h, selectedDate));
  const monthHs = hs.filter(h => habitFreq(h).type === 'monthly' && !periodicPaused(h, selectedDate));
  const vacHs = hs.filter(h => isPeriodic(h) ? periodicPaused(h, selectedDate) : onVacation(h, selectedDate));
  const st = dayStats(key);
  let html = '<div class="daynav">'
    + '<button class="icon-btn" data-action="prevDay" aria-label="Předchozí den">‹</button>'
    + '<div class="daynav-mid"><div class="daynav-date">' + (isToday ? 'Dnes' : fmtDateFull(selectedDate)) + '</div>'
    + (isToday ? '<div class="daynav-sub">' + fmtDateFull(selectedDate) + '</div>'
               : '<div class="daynav-sub"><button class="linklike" data-action="goToday">Zpět na dnešek</button></div>')
    + '</div>'
    + '<button class="icon-btn" data-action="nextDay" aria-label="Další den"' + (isToday ? ' disabled' : '') + '>›</button>'
    + '</div>';

  const hide = !!data.hideDone && !editMode;
  const shownDay = hide ? dayHs.filter(h => !isDone(h, key)) : dayHs;
  const shownWeek = hide ? weekHs.filter(h => !doneInWeek(h, startOfWeek(selectedDate))) : weekHs;
  const shownMonth = hide ? monthHs.filter(h => !doneInMonth(h, firstOfMonth(selectedDate))) : monthHs;
  const hiddenCnt = (dayHs.length - shownDay.length) + (weekHs.length - shownWeek.length) + (monthHs.length - shownMonth.length);

  if (dayHs.length){
    html += '<div class="card progress-card"><div class="progress-txt"><strong>Splněno ' + st.done + ' z ' + st.total + '</strong><span class="muted">' + st.pct + ' %</span></div>'
      + '<div class="bar"><div class="bar-fill" style="width:' + st.pct + '%"></div></div>'
      + '<div class="pc-tools"><button class="linklike" data-action="toggleHide">' + (hide ? '👁 Zobrazit i splněné' : '✓ Skrýt splněné') + '</button></div>'
      + '</div>';
  }

  html += '<div class="toolbar">'
    + '<button class="btn small" data-action="vacAll" aria-label="Hromadné prázdniny" title="Hromadné prázdniny">🏖️</button>'
    + '<button class="btn small' + (editMode ? ' primary' : '') + '" data-action="toggleEdit" aria-label="' + (editMode ? 'Hotovo' : 'Upravit') + '" title="' + (editMode ? 'Hotovo' : 'Upravit') + '">' + (editMode ? '✓' : '✏️') + '</button>'
    + '<button class="btn small" data-action="addHabit" aria-label="Přidat návyk" title="Přidat návyk">＋</button>'
    + '</div>';

  if (!hs.length){
    html += '<div class="card empty">Zatím tu nejsou žádné návyky.<br>Začněte tlačítkem <strong>＋ Přidat návyk</strong>.</div>';
  } else if (editMode){
    html += '<div class="habit-list">' + hs.map((h, i) => editRow(h, i, hs.length)).join('') + '</div>'
      + '<p class="hint">Pořadí změníte přetažením (na počítači) nebo šipkami ↑ ↓. Ikonou 🏖️ nastavíte návyku prázdniny. Podržením prstu na návyku (mimo režim úprav) přidáte poznámku ke dni.</p>';
  } else {
    const hasSections = weekHs.length || monthHs.length;
    if (hide && !shownDay.length && !shownWeek.length && !shownMonth.length && hiddenCnt){
      html += '<div class="card empty">🎉 Všechno hotovo — splněno ' + hiddenCnt + ' ' + plural(hiddenCnt, 'návyk', 'návyky', 'návyků') + '.</div>';
    } else {
      if (shownDay.length){
        if (hasSections) html += '<div class="sec-title">Denní</div>';
        html += '<div class="habit-list">' + shownDay.map(h => dayRow(h, key, false)).join('') + '</div>';
      } else if (!hide && offCnt){
        html += '<div class="card empty">Na ' + (isToday ? 'dnešek' : 'tento den') + ' nejsou naplánované žádné denní návyky. 🌤️</div>';
      }
      if (shownWeek.length){
        html += '<div class="sec-title">Jednou týdně</div><div class="habit-list">' + shownWeek.map(h => periodicRow(h, key)).join('') + '</div>';
      }
      if (shownMonth.length){
        html += '<div class="sec-title">Jednou měsíčně</div><div class="habit-list">' + shownMonth.map(h => periodicRow(h, key)).join('') + '</div>';
      }
      if (hide && hiddenCnt){
        html += '<p class="hint">Skryto ' + hiddenCnt + ' splněných.</p>';
      }
    }
    if (vacHs.length){
      html += '<div class="card vac-card"><span class="vac-emo">🏖️</span><span class="vac-tx"><strong>Na prázdninách</strong><span>'
        + vacHs.map(h => esc(h.name) + (vacUntil(h, selectedDate) ? ' (do ' + fmtKeyShort(vacUntil(h, selectedDate)) + ')' : '')).join(', ')
        + '</span></span></div>';
    }
  }

  const arch = archivedHabits();
  if (editMode && arch.length){
    html += '<div class="sec-title">Archivované návyky</div><div class="habit-list">'
      + arch.map(h => '<div class="habit-row edit archived" data-id="' + esc(h.id) + '">'
          + habitBadge(h)
          + '<span class="h-main"><span class="h-name">' + esc(h.name) + '</span><span class="h-meta">v archivu</span></span>'
          + '<span class="edit-controls">'
          +   '<button class="icon-btn" data-action="restoreHabit" data-id="' + esc(h.id) + '" aria-label="Obnovit">↩️</button>'
          +   '<button class="icon-btn" data-action="confirmDelete" data-id="' + esc(h.id) + '" data-arch="1" aria-label="Smazat">🗑️</button>'
          + '</span></div>').join('')
      + '</div>';
  }
  $('#view-day').innerHTML = html;
}

/* ============ Render: Kalendář (týden + měsíc) ============ */
function weekHtml(){
  const mon = weekAnchor;
  const hs = activeHabits();
  const t = today();
  let html = '<div class="daynav">'
    + '<button class="icon-btn" data-action="prevWeek" aria-label="Předchozí týden">‹</button>'
    + '<div class="daynav-mid"><div class="daynav-date">' + fmtWeekRange(mon) + '</div>'
    + (sameDay(mon, startOfWeek(t)) ? '<div class="daynav-sub">Tento týden</div>' : '<div class="daynav-sub"><button class="linklike" data-action="thisWeek">Na tento týden</button></div>')
    + '</div>'
    + '<button class="icon-btn" data-action="nextWeek" aria-label="Další týden">›</button>'
    + '</div>';

  if (!hs.length){
    return html + '<div class="card empty">Žádné aktivní návyky.</div>';
  }

  let grid = '<div class="wk-cell name"></div>';
  for (let i = 0; i < 7; i++){
    const d = addDays(mon, i);
    grid += '<button class="wk-cell wk-head' + (sameDay(d, t) ? ' today' : '') + '" data-action="gotoDay" data-key="' + dateKey(d) + '"><span>' + WD[i] + '</span><span class="wk-dnum">' + d.getDate() + '.</span></button>';
  }
  for (const h of hs){
    const f = habitFreq(h);
    const wkOk = f.type === 'weekly' && doneInWeek(h, mon);
    const paused = isPeriodic(h) && periodicPaused(h, mon);
    const nameExtra = isPeriodic(h)
      ? '<span class="wk-hfreq">1×/' + (f.type === 'weekly' ? 'týd' : 'měs') + (wkOk ? ' <span class="wk-okwk">✓</span>' : '') + (paused ? ' 🏖️' : '') + '</span>'
      : '';
    grid += '<div class="wk-cell name" title="' + esc(h.name) + ' — ' + esc(freqLabel(h)) + '">' + habitBadge(h) + '<span class="wk-hname">' + esc(h.name) + nameExtra + '</span></div>';
    for (let i = 0; i < 7; i++){
      const d = addDays(mon, i);
      const key = dateKey(d);
      const future = d > t;
      const vac = !isPeriodic(h) && onVacation(h, d);
      const off = !isPeriodic(h) && !isScheduled(h, d);
      const frz = !off && !future && frozenDay(h, d);
      const vt = vac ? ' title="Prázdniny 🏖️"' : (frz ? ' title="Zmrazeno 🧊 — streak pokračuje"' : '');
      if (h.type === 'check'){
        const on = isDone(h, key);
        grid += '<button class="wk-cell" data-action="cellToggle" data-id="' + esc(h.id) + '" data-key="' + key + '"' + (future ? ' disabled' : '') + vt + ' aria-label="' + esc(h.name) + ' ' + d.getDate() + '.' + (d.getMonth() + 1) + '.">'
          + '<span class="wk-dot' + (on ? ' on' : '') + (off && !on ? ' off' : '') + (frz && !on ? ' frz' : '') + '">' + (on ? '✓' : '') + '</span></button>';
      } else {
        const v = numVal(h, key);
        const on = isDone(h, key);
        const cls = (on ? ' on' : (v > 0 ? ' part' : '')) + (off && !on && v <= 0 ? ' wk-off' : '');
        grid += '<button class="wk-cell" data-action="gotoDay" data-key="' + key + '"' + (future ? ' disabled' : '') + vt + '>'
          + '<span class="wk-num' + cls + (frz && v <= 0 ? ' frz' : '') + '">' + (v > 0 ? fmtNum(v) : (frz ? '•' : '·')) + '</span></button>';
      }
    }
  }
  grid += '<div class="wk-cell name sum">Splněno</div>';
  for (let i = 0; i < 7; i++){
    const d = addDays(mon, i);
    const s = d > t ? null : dayStats(dateKey(d));
    grid += '<div class="wk-cell sum">' + (s ? s.done + '/' + s.total : '–') + '</div>';
  }

  html += '<div class="card grid-card"><div class="wk-scroll"><div class="wk-grid" style="grid-template-columns:minmax(84px,1.3fr) repeat(7,minmax(34px,46px));">' + grid + '</div></div>'
    + '<p class="hint">Ano/ne návyky odškrtnete klepnutím přímo v mřížce, číselné otevřou daný den. Čárkované dny = nenaplánováno nebo prázdniny.</p></div>';
  return html;
}

/* ============ Render: Měsíc ============ */
function monthHtml(){
  const first = monthAnchor;
  const t = today();
  const days = new Date(first.getFullYear(), first.getMonth() + 1, 0).getDate();
  const offset = (first.getDay() + 6) % 7;
  let html = '<div class="daynav">'
    + '<button class="icon-btn" data-action="prevMonth" aria-label="Předchozí měsíc">‹</button>'
    + '<div class="daynav-mid"><div class="daynav-date">' + cap(FMT_MONTH.format(first)) + '</div>'
    + (first.getFullYear() === t.getFullYear() && first.getMonth() === t.getMonth()
        ? '<div class="daynav-sub">Tento měsíc</div>'
        : '<div class="daynav-sub"><button class="linklike" data-action="thisMonth">Na tento měsíc</button></div>')
    + '</div>'
    + '<button class="icon-btn" data-action="nextMonth" aria-label="Další měsíc">›</button>'
    + '</div>';

  let cells = WD.map(w => '<div class="hm-wd">' + w + '</div>').join('');
  for (let i = 0; i < offset; i++) cells += '<div class="hm blank"></div>';
  let sumPct = 0, cnt = 0;
  for (let day = 1; day <= days; day++){
    const d = new Date(first.getFullYear(), first.getMonth(), day);
    const key = dateKey(d);
    if (d > t){
      cells += '<div class="hm future">' + day + '</div>';
      continue;
    }
    const s = dayStats(key);
    const extra = data.notes[key] ? '<i class="hm-nd"></i>' : '';
    const tExtra = data.notes[key] ? ' · 📝' : '';
    if (!s.total && activeHabits().length){
      cells += '<button class="hm vacday' + (sameDay(d, t) ? ' today' : '') + '" data-action="gotoDay" data-key="' + key + '" title="' + day + '. ' + (first.getMonth() + 1) + '. — nic naplánováno (prázdniny / volno)' + tExtra + '"><span>' + day + '</span>' + extra + '</button>';
      continue;
    }
    sumPct += s.pct; cnt++;
    let lvl = 'l0';
    if (s.total && s.done){
      lvl = s.pct < 25 ? 'l1' : s.pct < 50 ? 'l2' : s.pct < 75 ? 'l3' : 'l4';
    }
    cells += '<button class="hm ' + lvl + (sameDay(d, t) ? ' today' : '') + '" data-action="gotoDay" data-key="' + key + '" title="' + day + '. ' + (first.getMonth() + 1) + '. — splněno ' + s.done + ' z ' + s.total + ' (' + s.pct + ' %)' + tExtra + '"><span>' + day + '</span>' + extra + '</button>';
  }
  const avg = cnt ? Math.round(sumPct / cnt) : 0;
  html += '<div class="card"><div class="hm-grid">' + cells + '</div>'
    + '<div class="hm-foot"><span class="hm-legend">Méně <i class="hm l0"></i><i class="hm l1"></i><i class="hm l2"></i><i class="hm l3"></i><i class="hm l4"></i> Více</span>'
    + '<span class="hm-avg">Průměr: <strong>' + avg + ' %</strong></span></div>'
    + '<p class="hint">Barva dne odpovídá podílu splněných návyků. Klepnutím den otevřete.</p></div>';
  return html;
}
function renderCal(){
  const seg = '<div class="cal-seg"><div class="seg">'
    + '<button class="seg-btn' + (calView === 'week' ? ' on' : '') + '" data-action="calWeek">Týden</button>'
    + '<button class="seg-btn' + (calView === 'month' ? ' on' : '') + '" data-action="calMonth">Měsíc</button>'
    + '</div></div>';
  $('#view-cal').innerHTML = seg + (calView === 'week' ? weekHtml() : monthHtml());
}

/* ============ Render: Přehled ============ */
function renderStats(){
  const hs = activeHabits();
  const arch = archivedHabits();
  let best = null;
  for (const h of data.habits){
    if (isPeriodic(h)) continue; // týdenní/měsíční streaky se počítají v jiných jednotkách
    const s = longestStreak(h);
    if (!best || s > best.s) best = { h, s };
  }
  const daysLogged = Object.keys(data.entries).length;
  let html = '<div class="view-title">Přehled</div>'
    + '<div class="stat-cards">'
    + '<div class="stat"><span class="stat-num">' + rateOverDays(7) + ' %</span><span class="stat-lbl">úspěšnost 7 dní</span></div>'
    + '<div class="stat"><span class="stat-num">' + rateOverDays(30) + ' %</span><span class="stat-lbl">úspěšnost 30 dní</span></div>'
    + '<div class="stat"><span class="stat-num">🔥 ' + (best ? best.s : 0) + '</span><span class="stat-lbl">' + (best && best.s ? 'nejdelší streak — ' + esc(best.h.name) : 'nejdelší streak') + '</span></div>'
    + '<div class="stat"><span class="stat-num">' + daysLogged + '</span><span class="stat-lbl">' + plural(daysLogged, 'den se záznamem', 'dny se záznamem', 'dní se záznamem') + '</span></div>'
    + '</div>';

  if (hs.length || arch.length){
    const row = (h, dim) => {
      const fl = habitFreq(h).type !== 'daily' ? ' <span class="muted" style="font-size:12px;font-weight:400">(' + esc(freqLabel(h)) + ')</span>' : '';
      return '<tr' + (dim ? ' class="dim"' : '') + '><td><span class="tbl-emoji">' + (h.emoji ? esc(h.emoji) : '•') + '</span>' + esc(h.name) + fl + (dim ? ' <span class="muted">(archiv)</span>' : '') + '</td>'
        + '<td>' + currentStreak(h) + '</td><td>' + longestStreak(h) + '</td><td>' + habitRate(h) + ' %</td></tr>';
    };
    html += '<div class="card table-card"><table class="stat-table"><thead><tr><th>Návyk</th><th>🔥 Teď</th><th>Max</th><th>Úspěšnost</th></tr></thead><tbody>'
      + hs.map(h => row(h, false)).join('') + arch.map(h => row(h, true)).join('')
      + '</tbody></table></div>'
      + '<div class="sec-title">🏅 Milníky</div>'
      + '<div class="card"><div class="mile-grid">'
      + MILESTONES.map(m => {
          const got = data.milestones[m.id];
          return '<div class="mile' + (got ? ' got' : '') + '" title="' + (got ? 'Získáno ' + fmtKeyShort(got) : 'Zatím nezískáno') + '">'
            + '<span class="mile-e">' + m.e + '</span><span class="mile-t">' + esc(m.t) + '</span>'
            + (got ? '<span class="mile-d">' + fmtKeyShort(got) + '</span>' : '<span class="mile-d">🔒</span>')
            + '</div>';
        }).join('')
      + '</div></div>'
      + '<p class="hint">Streak i úspěšnost respektují nastavenou frekvenci — u „vybraných dnů“ se počítají jen naplánované dny, u týdenních/měsíčních celé týdny či měsíce (úspěšnost z posledních 4 týdnů, resp. 3 měsíců).</p>';
  }

  html += '<div class="sec-title">🎨 Vzhled</div>'
    + '<div class="card"><div class="row-btns"><button class="btn" data-action="openTheme">🎨 Přizpůsobit vzhled</button></div>'
    + '<p class="muted" style="margin:10px 0 0;font-size:13.5px">Pozadí, barva karet i textu. Změny se přenáší v záloze.</p></div>';

  html += '<div class="card"><div class="sec-title" style="margin-top:0">Záloha a přenos dat</div>'
    + '<p class="muted" style="margin:6px 0 12px">Data se ukládají jen v tomto zařízení a prohlížeči (localStorage) — mezi Macem a iPhonem se nesynchronizují. Pro přenos vyexportujte JSON zálohu, uložte ji na iCloud Drive a na druhém zařízení ji importujte.</p>'
    + '<div class="row-btns"><button class="btn" data-action="exportData">⬇️ Exportovat data</button>'
    + '<button class="btn" data-action="importData">⬆️ Importovat data</button></div></div>';
  $('#view-stats').innerHTML = html;
}

/* ============ Render: Jídlo ============ */
let mealSnackUI = { key: null, n: 1 };

  if (mealSnackUI.key !== key) mealSnackUI = { key, n: Math.max(1, m.sn.length) };
  else mealSnackUI.n = Math.max(mealSnackUI.n, m.sn.length, 1);

  let html = '<div class="daynav">'
    + '<button class="icon-btn" data-action="prevDay" aria-label="Předchozí den">‹</button>'
    + '<div class="daynav-mid"><div class="daynav-date">' + (isToday ? 'Dnes' : fmtDateFull(selectedDate)) + '</div>'
    + (isToday ? '<div class="daynav-sub">' + fmtDateFull(selectedDate) + '</div>'
               : '<div class="daynav-sub"><button class="linklike" data-action="goToday">Zpět na dnešek</button></div>')
    + '</div>'
    + '<button class="icon-btn" data-action="nextDay" aria-label="Další den">›</button>'
    + '</div>';

    + '<textarea id="' + id + '" class="meal-f" rows="2" maxlength="2000" aria-label="' + label + '" placeholder="' + ph + '">' + esc(value) + '</textarea></div>';

  let snacks = '';
  for (let i = 0; i < mealSnackUI.n; i++){
    snacks += '<input type="text" class="meal-f meal-sn" data-sn="' + i + '" maxlength="500" value="' + esc(m.sn[i] || '') + '" placeholder="Svačina ' + (i + 1) + '" aria-label="Svačina ' + (i + 1) + '">';

  html += '<div class="card">'
    + group('meal-b', '🥣', 'Snídaně', m.b, 'např. ovesná kaše s ovocem', 'b')

/* ============ Render: Plán ============ */
function planSections(text){
  const dayMap = { 'PONDĚLÍ': 0, 'ÚTERÝ': 1, 'STŘEDA': 2, 'ČTVRTEK': 3, 'PÁTEK': 4, 'SOBOTA': 5, 'NEDĚLE': 6 };
  const dayRe = /^\s*[•\-–—*]*\s*(PONDĚLÍ|ÚTERÝ|STŘEDA|ČTVRTEK|PÁTEK|SOBOTA|NEDĚLE)(?!\p{L})[:\s–—-]*(.*)$/iu;
  const headRe = /^\s*(\p{Extended_Pictographic}(?:[\uFE0F\u200D]|\p{Extended_Pictographic})*)\s*(\S.*)$/u;
  const secs = [];
  let cur = { kind: 'text', lines: [] };
  const push = () => { if (cur.kind !== 'text' || cur.lines.some(l => l.trim())) secs.push(cur); };
  for (const line of String(text).split('\n')){
    let m = line.match(dayRe);
    if (m){
      push();
      cur = { kind: 'day', day: dayMap[m[1].toUpperCase()], sub: (m[2] || '').trim(), lines: [] };
      continue;
    }
    m = line.match(headRe);
    if (m){
      push();
      cur = { kind: 'head', title: line.trim(), lines: [] };
      continue;
    }
    cur.lines.push(line);
  }
  push();
  return secs;
}
function planInline(t){
  let pill = '';
  let m = t.match(/^([^|]{1,14}?)\s*\|\s*(.+)$/);
  if (m){ pill = '<span class="pl-time">' + esc(m[1].trim()) + '</span> '; t = m[2]; }
  let html;
  m = t.match(/^([0-9]+\.\s+)?([^:]{1,30}):\s+(.+)$/);
  if (m && /\p{L}/u.test(m[2])){
    html = (m[1] ? esc(m[1]) : '') + '<strong>' + esc(m[2]) + ':</strong> ' + esc(m[3]);
  } else if ((m = t.match(/^([^:]{1,30}):\s*$/)) && /\p{L}/u.test(m[1])){
    html = '<strong>' + esc(m[1]) + ':</strong>';
  } else {
    html = esc(t);
  }
  return pill + html;
}
function planLineHtml(line){
  if (!line.trim()) return '<div class="pl-sp"></div>';
  let m = line.match(/^\s+\*\s+(.*)$/) || line.match(/^\s*[◦▪]\s+(.*)$/);
  if (m) return '<div class="pl-li sub"><span class="pl-dot">–</span><span class="pl-tx">' + planInline(m[1]) + '</span></div>';
  m = line.match(/^\s*[•\-–*]\s+(.*)$/);
  if (m) return '<div class="pl-li"><span class="pl-dot">•</span><span class="pl-tx">' + planInline(m[1]) + '</span></div>';
  return '<div class="pl-p">' + planInline(line.trim()) + '</div>';
}
function planBodyHtml(text){
  const out = [];
  let blank = false;
  for (const line of String(text).split('\n')){
    if (!line.trim()){ blank = true; continue; }
    if (blank && out.length) out.push('<div class="pl-sp"></div>');
    blank = false;
    out.push(planLineHtml(line));
  }
  return out.join('');
}
function planPrettyHtml(text){
  const secs = planSections(text);
  if (!secs.some(s => s.kind === 'day')){
    return '<div class="card"><div class="plan-text">' + planBodyHtml(text) + '</div></div>';
  }
  const tIdx = weekdayIdx(today());
  let html = '';
  for (const s of secs){
    const body = s.lines.join('\n').replace(/^\n+|\n+$/g, '');
    if (s.kind === 'head'){
      html += '<div class="plan-head">' + esc(s.title) + '</div>';
      if (body) html += '<div class="card"><div class="plan-text">' + planBodyHtml(body) + '</div></div>';
    } else if (s.kind === 'day'){
      const isT = s.day === tIdx;
      html += '<details class="plan-day' + (isT ? ' today' : '') + '"' + (isT ? ' open' : '') + '>'
        + '<summary><span class="day-tag d' + s.day + '">' + WD[s.day] + '</span>'
        + '<span class="plan-day-title">' + esc(s.sub || WDFULL[s.day]) + '</span>'
        + (isT ? '<span class="today-tag">dnes</span>' : '')
        + '<span class="chev">›</span></summary>'
        + (body ? '<div class="plan-body">' + planBodyHtml(body) + '</div>' : '')
        + '</details>';
    } else if (body){
      html += '<div class="card"><div class="plan-text">' + planBodyHtml(body) + '</div></div>';
    }
  }
  return html;
}
function renderPlan(){
  let html = '<div class="view-title">Plán</div>';
  if (planEdit){
    html += '<div class="card">'
      + '<textarea id="plan-ta" class="plan-ta" maxlength="50000" aria-label="Text plánu">' + esc(planDraft) + '</textarea>'
      + '<div class="row-btns" style="margin-top:12px"><button class="btn" data-action="cancelPlan">Zrušit</button>'

/* ============ Export / Import ============ */
function exportData(){
  const json = JSON.stringify(data, null, 2);
  const fname = 'habit-tracker-zaloha-' + dateKey(today()) + '.json';
  try {
    const file = new File([json], fname, { type: 'application/json' });
    if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share){
      navigator.share({ files: [file], title: 'Záloha Habit Trackeru' })
        .then(() => toast('Záloha sdílena'))
        .catch(err => { if (!err || err.name !== 'AbortError') downloadExport(json, fname); });
      return;
    }
  } catch (e) {}
  downloadExport(json, fname);
}
function downloadExport(json, fname){
  const blob = new Blob([json], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = fname;
  document.body.appendChild(a);
  a.click();
  setTimeout(() => { URL.revokeObjectURL(a.href); a.remove(); }, 500);
  toast('Záloha byla stažena');
}
function handleImportFile(file){
  const reader = new FileReader();
  reader.onload = () => {
    let obj;
    try { obj = JSON.parse(reader.result); }
    catch (e) { toast('Soubor není platný JSON.', true); return; }
    const err = validateData(obj);
    if (err){ toast('Import zamítnut: ' + err, true); return; }
    pendingImport = normalizeData(obj);
    const nHab = pendingImport.habits.length;
    const nDays = Object.keys(pendingImport.entries).length;
    openModal(
      '<div class="sheet-title">Importovat data?</div>'
      + '<p class="muted">Soubor obsahuje <strong>' + nHab + ' ' + plural(nHab, 'návyk', 'návyky', 'návyků') + '</strong> a záznamy pro <strong>' + nDays + ' ' + plural(nDays, 'den', 'dny', 'dní') + '</strong>.<br>Importem <strong>přepíšete</strong> všechna současná data v tomto zařízení.</p>'
      + '<div class="modal-actions"><button class="btn" data-action="closeModal">Zrušit</button>'
      + '<button class="btn primary" data-action="applyImport">Importovat</button></div>'
    );
  };
  reader.onerror = () => toast('Soubor se nepodařilo přečíst.', true);
  reader.readAsText(file);
}

/* ============ Přesouvání ============ */
function reorderActive(fromIdx, toIdx){
  const act = activeHabits();
  if (fromIdx === toIdx || fromIdx < 0 || toIdx < 0 || fromIdx >= act.length || toIdx >= act.length) return;
  const pool = act.map(h => h.order);
  const moved = act.splice(fromIdx, 1)[0];
  act.splice(toIdx, 0, moved);
  act.forEach((h, i) => { h.order = pool[i]; });
  save();
}
function moveHabit(id, dir){
  const act = activeHabits();
  const i = act.findIndex(h => h.id === id);
  const j = i + dir;
  if (i < 0 || j < 0 || j >= act.length) return;
  const tmp = act[i].order;
  act[i].order = act[j].order;
  act[j].order = tmp;
  save();
}

let lpTimer = null, lpConsume = false, lpX = 0, lpY = 0;

  if (editMode || tab !== 'day') return;
  const row = ev.target.closest('#view-day .habit-row');

  if (!id) return;
